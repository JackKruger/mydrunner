<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mydrunner</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #111; color: #eee; font-family: ui-monospace, monospace; }
      #app { width: 100vw; height: 100vh; }
      #hud { position: fixed; top: 8px; left: 8px; padding: 6px 10px; background: rgba(0,0,0,0.5); border-radius: 4px; font-size: 12px; line-height: 1.4; pointer-events: none; }
      #help { position: fixed; bottom: 8px; left: 8px; padding: 6px 10px; background: rgba(0,0,0,0.5); border-radius: 4px; font-size: 11px; line-height: 1.4; pointer-events: none; opacity: 0.7; }

      /* ── Startup menu ───────────────────────────────────────────── */
      #menu {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.88);
        z-index: 100;
      }
      #menu-panel {
        background: #1a1a1a;
        border: 1px solid #2e2e2e;
        border-radius: 8px;
        padding: 36px 44px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        min-width: 320px;
      }
      #menu-title {
        font-size: 30px;
        letter-spacing: 3px;
        color: #d9531e;
        text-align: center;
        margin-bottom: 4px;
      }
      .menu-label {
        font-size: 10px;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: -10px;
      }
      #name-input {
        background: #111;
        border: 1px solid #333;
        border-radius: 4px;
        color: #eee;
        font-family: ui-monospace, monospace;
        font-size: 14px;
        padding: 9px 11px;
        outline: none;
        width: 100%;
      }
      #name-input:focus { border-color: #d9531e; }
      #color-row {
        display: flex;
        gap: 10px;
      }
      .color-swatch {
        width: 34px;
        height: 34px;
        border-radius: 5px;
        cursor: pointer;
        border: 2px solid transparent;
        flex-shrink: 0;
        transition: transform 0.1s;
      }
      .color-swatch:hover { transform: scale(1.1); }
      .color-swatch.selected {
        border-color: #fff;
        box-shadow: 0 0 0 1px #fff;
      }
      #play-btn {
        background: #d9531e;
        border: none;
        border-radius: 4px;
        color: #fff;
        font-family: ui-monospace, monospace;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 3px;
        padding: 11px 0;
        cursor: pointer;
        text-transform: uppercase;
        margin-top: 4px;
        width: 100%;
      }
      #play-btn:hover { background: #c44719; }
      #play-btn:active { background: #a83c14; }

      /* ── Touch controls ─────────────────────────────────────────── */
      #touch-controls {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 50;
        display: none;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }
      body.touch #touch-controls { display: block; }
      body.touch #help { display: none; }

      #steer-pad {
        position: absolute;
        left: 24px;
        bottom: 24px;
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        border: 2px solid rgba(255, 255, 255, 0.18);
        pointer-events: auto;
      }
      #steer-knob {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 70px;
        height: 70px;
        margin: -35px 0 0 -35px;
        border-radius: 50%;
        background: rgba(217, 83, 30, 0.7);
        border: 2px solid rgba(255, 255, 255, 0.4);
        pointer-events: none;
        transition: background 0.1s;
      }
      #steer-pad.active #steer-knob { background: rgba(217, 83, 30, 0.95); }

      #pedal-stack {
        position: absolute;
        right: 24px;
        bottom: 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: flex-end;
      }
      .pedal {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        border: 2px solid rgba(255, 255, 255, 0.18);
        color: #eee;
        font-family: ui-monospace, monospace;
        font-size: 11px;
        font-weight: bold;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        pointer-events: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }
      .pedal.pressed { background: rgba(217, 83, 30, 0.85); border-color: rgba(255, 255, 255, 0.5); }
      #throttle-btn { background: rgba(70, 107, 58, 0.4); }
      #throttle-btn.pressed { background: rgba(120, 180, 90, 0.85); }
      #brake-btn { background: rgba(178, 58, 72, 0.4); }
      #brake-btn.pressed { background: rgba(220, 70, 90, 0.9); }

      #aux-row {
        position: absolute;
        right: 24px;
        top: 24px;
        display: flex;
        gap: 10px;
      }
      .aux-btn {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #eee;
        font-family: ui-monospace, monospace;
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
        pointer-events: auto;
        padding: 0;
      }
      .aux-btn.pressed { background: rgba(217, 83, 30, 0.7); }

      #handbrake-btn {
        position: absolute;
        right: 132px;
        bottom: 36px;
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.5);
        border: 2px solid rgba(255, 255, 255, 0.2);
        color: #eee;
        font-family: ui-monospace, monospace;
        font-size: 10px;
        font-weight: bold;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        pointer-events: auto;
        padding: 0;
      }
      #handbrake-btn.pressed { background: rgba(217, 83, 30, 0.85); }

      @media (max-width: 480px) {
        #steer-pad { width: 130px; height: 130px; left: 16px; bottom: 16px; }
        #steer-knob { width: 56px; height: 56px; margin: -28px 0 0 -28px; }
        .pedal { width: 80px; height: 80px; }
        #pedal-stack { right: 16px; bottom: 16px; gap: 10px; }
        #handbrake-btn { right: 108px; bottom: 28px; width: 60px; height: 60px; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">connecting…</div>
    <div id="help">WASD / Arrows = drive · Space = handbrake · Shift = brake · R = reset · C = camera · M = mute</div>

    <div id="touch-controls">
      <div id="steer-pad"><div id="steer-knob"></div></div>
      <button id="handbrake-btn" type="button">hand<br/>brake</button>
      <div id="pedal-stack">
        <button class="pedal" id="throttle-btn" type="button">gas</button>
        <button class="pedal" id="brake-btn" type="button">brake</button>
      </div>
      <div id="aux-row">
        <button class="aux-btn" id="cam-btn" type="button">cam</button>
        <button class="aux-btn" id="reset-btn" type="button">reset</button>
        <button class="aux-btn" id="mute-btn" type="button">mute</button>
      </div>
    </div>

    <div id="menu">
      <div id="menu-panel">
        <div id="menu-title">mydrunner</div>
        <span class="menu-label">name</span>
        <input id="name-input" type="text" maxlength="32" autocomplete="off" spellcheck="false" />
        <span class="menu-label">colour</span>
        <div id="color-row">
          <span class="color-swatch selected" data-color="d9531e" style="background:#d9531e" title="burnt orange"></span>
          <span class="color-swatch" data-color="2a4a6a" style="background:#2a4a6a" title="navy"></span>
          <span class="color-swatch" data-color="466b3a" style="background:#466b3a" title="olive"></span>
          <span class="color-swatch" data-color="c9b86b" style="background:#c9b86b" title="sand"></span>
          <span class="color-swatch" data-color="8b4513" style="background:#8b4513" title="saddle brown"></span>
          <span class="color-swatch" data-color="b23a48" style="background:#b23a48" title="brick red"></span>
        </div>
        <button id="play-btn">drive</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

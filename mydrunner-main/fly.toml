# Fly.io app config for the mydrunner game server.
# Deploy with: flyctl deploy --config fly.toml
# Authoritative WebSocket server runs in one region close to most players;
# multi-region requires room-sharding which is out of scope for v1.

app = "mydrunner-server"
primary_region = "ord"
kill_signal = "SIGTERM"
kill_timeout = 5

[build]
  dockerfile = "packages/server/Dockerfile"

[env]
  PORT = "2567"
  NODE_ENV = "production"

[[services]]
  internal_port = 2567
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    soft_limit = 50
    hard_limit = 100

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "3s"
    grace_period = "10s"
    method = "get"
    path = "/health"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

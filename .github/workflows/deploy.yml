name: Deploy
on:
  push:
    branches:
      - main
      # Also deploy from the active dev branch so we can iterate without
      # merging to main yet. Remove this once main is the source of truth.
      - claude/add-claude-documentation-b6LkY
  workflow_dispatch:

# Cancel an in-flight deploy if a newer commit arrives.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Server: built from the monorepo Dockerfile, deployed to Fly.io ---
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # --- Client: static build via Vite, deployed to GitHub Pages ---
  client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # The client needs to know the production server URL at build time.
      # Set this to the wss:// URL of your Fly app.
      - name: Build client
        env:
          VITE_SERVER_URL: ${{ secrets.PUBLIC_SERVER_URL || 'wss://mydrunner-server.fly.dev' }}
          # GitHub Pages serves at /<repo>/ unless a custom domain is configured.
          # Set VITE_BASE=/ if you have a custom domain.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: pnpm --filter @mydrunner/client run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/client/dist
      - id: deployment
        uses: actions/deploy-pages@v4

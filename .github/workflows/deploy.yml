name: Deploy Client
# Railway handles the server (auto-deploys via its GitHub integration when
# this branch lands). This workflow only ships the client to GitHub Pages.
on:
  push:
    branches:
      - main
      # Active dev branch - remove once main is the source of truth.
      - claude/add-claude-documentation-b6LkY
  workflow_dispatch:

concurrency:
  group: deploy-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build client
        env:
          # Set this secret in repo settings to your Railway-provided
          # public WebSocket URL, e.g. wss://mydrunner-server.up.railway.app
          VITE_SERVER_URL: ${{ secrets.PUBLIC_SERVER_URL }}
          VITE_BASE: /${{ github.event.repository.name }}/
        run: pnpm --filter @mydrunner/client run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/client/dist
      - id: deployment
        uses: actions/deploy-pages@v4
